

services:
  nginx:
    image: nginx:alpine
    ports:
      - "4890:4890"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./Client/dist:/usr/share/nginx/html
    depends_on:
      # - web1
      # - web2
      - server1
      - server2
