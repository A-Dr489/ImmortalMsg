  #         action: rebuild
  #       - path: ./Client
  #         target: /app
  #         action: sync
  server1:
    depends_on:
      - db
    build: ./Server
    ports:
      - 3000:3000
    develop:
      watch:
        - path: ./Server/package.json
          action: rebuild
        - path: ./Server/package-lock.json
          action: rebuild
        - path: ./Server
          target: /app
          action: sync
  server2:
    depends_on:
      - db
    build: ./Server
    ports:
      - 3001:3000
    develop:
      watch:
        - path: ./Server/package.json
          action: rebuild
        - path: ./Server/package-lock.json
          action: rebuild
        - path: ./Server
          target: /app
          action: sync
  auth1:
    depends_on:
      - db
    build: ./AuthService
    ports:
      - 3002:3000
    develop:
      watch:
        - path: ./AuthService/package.json
          action: rebuild
        - path: ./AuthService/package-lock.json
          action: rebuild
        - path: ./AuthService
          target: /app
          action: sync
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: callof12
      POSTGRES_DB: immortalmsg
    ports:
      - 5432:5432
    volumes:
      - name:/var/lib/postgresql/data
    

volumes:
  name:
